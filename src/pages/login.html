<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - DevSkill</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#703700",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d2d9f4",
                        "on-surface-variant": "#464554",
                        "secondary": "#575992",
                        "tertiary": "#904900",
                        "on-tertiary-container": "#fffbff",
                        "inverse-primary": "#c0c1ff",
                        "inverse-surface": "#283044",
                        "primary": "#4648d4",
                        "on-primary-fixed": "#07006c",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dae2fd",
                        "secondary-fixed": "#e1e0ff",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-secondary-fixed-variant": "#404178",
                        "on-background": "#131b2e",
                        "background": "#faf8ff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-secondary-container": "#494b83",
                        "surface-container-low": "#f2f3ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "error-container": "#ffdad6",
                        "surface-container": "#eaedff",
                        "primary-fixed": "#e1e0ff",
                        "surface-bright": "#faf8ff",
                        "on-secondary-fixed": "#13144a",
                        "on-secondary": "#ffffff",
                        "outline": "#767586",
                        "on-tertiary-fixed": "#301400",
                        "error": "#ba1a1a",
                        "surface": "#faf8ff",
                        "surface-tint": "#494bd6",
                        "on-primary-container": "#fffbff",
                        "outline-variant": "#c7c4d7",
                        "secondary-container": "#bdbefe",
                        "primary-container": "#6063ee",
                        "tertiary-fixed": "#ffdcc5",
                        "inverse-on-surface": "#eef0ff",
                        "on-surface": "#131b2e",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#b55d00",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e2e7ff",
                        "surface-container-highest": "#dae2fd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .form-container {
            animation: slideInUp 0.6s ease-in-out forwards;
        }

        .form-group {
            animation: slideInUp 0.6s ease-in-out forwards;
        }

        .form-input {
            transition: all 0.3s ease;
        }

        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(70, 72, 212, 0.1);
        }

        .btn-primary {
            background-color: #4648d4;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #2f2ebe;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(70, 72, 212, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #dae2fd;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #131b2e;
            background-color: #faf8ff;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #4648d4;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(70, 72, 212, 0.1);
        }

        .input-field::placeholder {
            color: #464554;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <!-- Logo and Branding -->
            <div class="text-center mb-12 form-container">
                <div class="flex items-center justify-center mb-6">
                    <div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-on-primary font-headline font-bold text-2xl shadow-lg">
                        D
                    </div>
                </div>
                <h1 class="font-headline text-3xl font-bold text-on-surface mb-2">DevSkill</h1>
                <p class="text-on-surface-variant text-sm">Precision Suite</p>
            </div>

            <!-- Login Form -->
            <form class="space-y-6 form-container" onsubmit="handleLogin(event)">
                <!-- Email Input -->
                <div class="form-group">
                    <label for="email" class="block text-sm font-medium text-on-surface mb-2">Email Address</label>
                    <input
                        id="email"
                        type="email"
                        placeholder="you@example.com"
                        class="input-field"
                        required
                        autocomplete="email"
                    />
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-on-surface">Password</label>
                        <a href="#" class="text-sm text-primary hover:underline font-medium">Forgot password?</a>
                    </div>
                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        class="input-field"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <!-- Remember Me -->
                <div class="flex items-center gap-2 form-group">
                    <input
                        id="remember"
                        type="checkbox"
                        class="w-4 h-4 rounded border-outline cursor-pointer"
                    />
                    <label for="remember" class="text-sm text-on-surface-variant cursor-pointer">
                        Remember me
                    </label>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="w-full btn-primary py-3 rounded-lg font-semibold text-sm transition-all duration-300 form-group"
                >
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8 form-container">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-background text-on-surface-variant">Or continue with</span>
                </div>
            </div>

            <!-- Social Login Buttons -->
            <div class="grid grid-cols-2 gap-4 mb-8 form-container">
                <button type="button" class="flex items-center justify-center gap-2 py-2.5 px-4 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-300">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span class="text-sm font-medium">Google</span>
                </button>
                <button type="button" class="flex items-center justify-center gap-2 py-2.5 px-4 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-300">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="#131b2e"/>
                    </svg>
                    <span class="text-sm font-medium">GitHub</span>
                </button>
            </div>

            <!-- Register Link -->
            <div class="text-center form-container">
                <p class="text-sm text-on-surface-variant">
                    Don't have an account?
                    <a href="register.html" class="text-primary font-semibold hover:underline">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            console.log('Login submitted:', { email, password, remember });
            alert('Login successful! Redirecting to dashboard...');
            
            // Redirect to landing page
            window.location.href = 'landing_page.html';
        }
    </script>
</body>
</html>
